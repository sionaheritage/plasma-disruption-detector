# ==========================================
# Plasma Disruption Predictor Configuration
# ==========================================

data:
  seq_length: 50
  num_features: 5
  train_samples: 2000
  test_samples: 1000

model:
  hidden_size: 64
  num_layers: 2
  dropout_rate: 0.2

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  train_split: 0.8

inference:
  actuation_threshold: 0.85

paths:
  model_dir: "../models"
  model_name: "best_plasma_lstm.pth"